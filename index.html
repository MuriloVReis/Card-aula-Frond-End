<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,600&display=swap" rel="stylesheet">

    <!-- Chamada Para Folha de Estilos -->
    <link rel="stylesheet" href="/styles.css">
    <title>Card - Redes Sociais</title>
</head>
<body>
    <div class="container">
            <!-- Inserindo Imagem-->
            <img src ='/imagem/Murilo.jpg' alt = "Foto da Valéria">

            <!-- Título Principal -->
            <h1>Murilo Reis</h1>

            <!-- Título Secundário -->
            <h2>São Paulo, Brasil</h2>
            
            <!-- Parágrafo -->
            <p>SAP consultor, S/4 HANA and Fiori profissional</p>
            
        <!-- Lista de Redes Sociais -->             
        <ul class="social">
            <li><a href="http://github.com" target="_blank">GitHub</a></li>
            <li><a href="http://dribbble.com" target="_blank">Dribbble</a></li>
            <li><a href="http://linkedin.com" target="_blank">LinkedIn</a></li>
            <li><a href="http://instagram.com" target="_blank">Instagram</a></li>
            <li><a href="http://x.com" target="_blank">X</a></li>
        </ul>  
    </div>
</body>
</html>
